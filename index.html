<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSS - Stock System | Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f3f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 440px;
            border-radius: 40px;
            padding: 50px 40px;
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.05), 0 5px 15px rgba(0, 0, 0, 0.03);
            text-align: center;
            position: relative;
        }

        .input-group label {
            display: block;
            text-align: left;
            font-size: 10px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            padding-left: 2px;
        }

        .input-field {
            width: 100%;
            background-color: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: 14px;
            padding: 14px 20px;
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            background-color: #ffffff;
            border-color: #009e60;
            box-shadow: 0 0 0 4px rgba(0, 158, 96, 0.05);
            outline: none;
        }

        .login-btn {
            width: 100%;
            background-color: #009e60;
            color: white;
            border-radius: 14px;
            padding: 16px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
            margin-top: 10px;
            box-shadow: 0 10px 20px -5px rgba(0, 158, 96, 0.3);
        }

        .login-btn:hover {
            background-color: #008a54;
            transform: translateY(-1px);
            box-shadow: 0 12px 25px -5px rgba(0, 158, 96, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .logo-box {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #cbd5e1;
            display: inline-block;
            margin-right: 6px;
        }
        .status-dot.active { background: #009e60; animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 158, 96, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(0, 158, 96, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 158, 96, 0); }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="logo-box">
             <!-- PSS System Logo SVG -->
             <svg width="60" height="60" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="mb-4">
                <path d="M20 30C20 24.4772 24.4772 20 30 20H70C75.5228 20 80 24.4772 80 30V45C80 50.5228 75.5228 55 70 55H30V80" stroke="#009e60" stroke-width="12" stroke-linecap="round"/>
                <path d="M45 40L65 40C70.5228 40 75 44.4772 75 50V65C75 70.5228 70.5228 75 65 75H35" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>
                <circle cx="28" cy="28" r="4" fill="#60a5fa"/>
             </svg>
             <div class="text-[10px] font-extrabold text-[#64748b] tracking-[0.2em] uppercase mb-1">Prasatek System Solutions</div>
             <h1 class="text-3xl font-black text-[#1e293b] tracking-tight mb-6">PSS - Stock <span class="text-[#009e60]">System</span></h1>
             
             <div class="mb-8">
                 <h2 class="text-2xl font-bold text-[#334155] mb-1">Welcome Back</h2>
                 <p class="text-[#94a3b8] text-sm font-medium">Sign in to manage your system</p>
             </div>
        </div>

        <form id="loginForm" class="space-y-6">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" class="input-field" placeholder="Enter username" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            </div>

            <div class="input-group">
                <label>Select Location</label>
                <select id="location" class="input-field appearance-none cursor-pointer">
                    <option value="" disabled selected>Connecting to Cloud...</option>
                </select>
            </div>

            <button type="submit" id="btn-login" class="login-btn">
                <span>Login</span>
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="3">
                    <path d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                </svg>
            </button>
        </form>

        <div id="error-msg" class="hidden mt-6 p-4 bg-rose-50 border border-rose-100 rounded-2xl flex items-center gap-3 animate-pulse">
            <svg class="w-5 h-5 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-xs font-bold text-rose-600" id="error-text">Login details invalid</span>
        </div>

        <div class="mt-10 border-t border-slate-50 pt-6">
            <div class="text-[9px] font-black text-slate-300 tracking-widest uppercase">A Product by Prasatek System Solutions</div>
        </div>
    </div>

    <div class="mt-8 text-center">
        <div class="flex items-center justify-center gap-2 mb-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
            <span class="status-dot active"></span> Cloud Server: Operations Optimal
        </div>
        <p class="text-[9px] font-bold text-slate-300 uppercase tracking-[0.2em]">&copy; 2026 Prasatek System Solutions. All Rights Reserved.</p>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, query, where, limit, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDNpEbBt638KQGgkD4EvtqrRvInupP55zM",
            authDomain: "bills-de7ee.firebaseapp.com",
            projectId: "bills-de7ee",
            storageBucket: "bills-de7ee.firebasestorage.app",
            messagingSenderId: "970664008722",
            appId: "1:970664008722:web:d84829f233a6d40f6bcccb",
            measurementId: "G-WHSRHW81E0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Constants matching Main App
        const ALL_PAGES = ["dashboard", "stock_check", "items", "suppliers", "locations", "users", "direct_add", "po", "grn", "prn", "transfer_out", "transfer_in", "verification", "bincard", "billing", "reports", "restock", "bulk_update", "settings", "company", "po_approve"];

        async function init() {
            try {
                // 1. Ensure Company Settings Exist
                const compSnap = await getDoc(doc(db, "settings", "company"));
                if (!compSnap.exists()) {
                    await setDoc(doc(db, "settings", "company"), { 
                        name: "PSS - Stock System", 
                        addr: "PSS Plaza, Main Street, Colombo", 
                        tel: "+94 112 000 000", 
                        email: "support@prasatek.com", 
                        web: "www.prasatek.com", 
                        tax: "VAT-PSS-001" 
                    });
                }

                // 2. Ensure Main Warehouse Exists
                const locsSnap = await getDocs(collection(db, "locations"));
                if (locsSnap.empty) {
                    await addDoc(collection(db, "locations"), {
                        name: "Main Warehouse",
                        remark: "System Default",
                        pages: ALL_PAGES
                    });
                }

                // 2. Ensure Master Admin Exists
                const usersSnap = await getDocs(query(collection(db, "users"), where("username", "==", "admin")));
                if (usersSnap.empty) {
                    await addDoc(collection(db, "users"), {
                        fullName: "Master Admin",
                        username: "admin",
                        password: "8591",
                        allowedLocs: ["Main Warehouse"], // Admin gets access to created loc
                        permissions: ALL_PAGES
                    });
                }

                // 3. Load Locations into Dropdown
                const freshLocs = await getDocs(collection(db, "locations"));
                const select = document.getElementById('location');
                select.innerHTML = `<option value="" disabled selected>Select Location</option>`;

                freshLocs.forEach(doc => {
                    const data = doc.data();
                    const opt = document.createElement('option');
                    opt.value = data.name; // Use name as ID for simplicity in this user request context
                    opt.innerText = data.name;
                    select.appendChild(opt);
                });

            } catch (error) {
                console.error("Init Error:", error);
                showError("Cloud Connection Failed. Check Console.");
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const l = document.getElementById('location').value;

            if (!l) return showError("Please select a valid Location.");

            const btn = document.getElementById('btn-login');
            btn.innerHTML = `<span class="animate-pulse">Authenticating...</span>`;
            btn.disabled = true;

            try {
                // Fetch User
                const q = query(collection(db, "users"), where("username", "==", u), limit(1));
                const snap = await getDocs(q);

                if (snap.empty) throw new Error("Invalid Username");

                const userData = snap.docs[0].data();

                // Verify Password
                if (userData.password !== p) throw new Error("Invalid Password");

                // Verify Location Access (Handle Admin Override if needed, but per request admin is a user)
                // Assuming Admin acts like a normal user but with all perms in creating script.
                // However, request said "Master Admin account...". 
                // We check if 'allowedLocs' includes 'l' OR if user is admin (security fallback)
                if (userData.username !== 'admin' && !userData.allowedLocs.includes(l)) {
                    throw new Error("Access Denied to this Location.");
                }

                // Fetch Location Data to get Page Permissions
                const locQ = query(collection(db, "locations"), where("name", "==", l), limit(1));
                const locSnap = await getDocs(locQ);
                if (locSnap.empty) throw new Error("Location data invalid.");
                const locData = locSnap.docs[0].data();

                // Compute Final Permissions (Intersection of User & Location)
                // User said "location only have option selected pages... user permissions... tick only that"
                // So effective permissions = UserPermissions AND LocationPages
                const userPerms = userData.username === 'admin' ? ALL_PAGES : userData.permissions;
                const locPerms = locData.pages || [];

                const finalPerms = userPerms.filter(page => locPerms.includes(page));

                if (finalPerms.length === 0 && userData.username !== 'admin') {
                    throw new Error("No active page permissions for this location.");
                }

                // Create Session
                const sessionData = {
                    user: userData.fullName,
                    username: userData.username,
                    loc: l,
                    perms: finalPerms,
                    isAdmin: userData.username === 'admin'
                };

                sessionStorage.setItem('ims_session', JSON.stringify(sessionData));

                // Redirect
                window.location.href = 'main.html';

            } catch (err) {
                showError(err.message || "Login Failed");
                btn.innerHTML = "Access System";
                btn.disabled = false;
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            const txt = document.getElementById('error-text');
            txt.innerText = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        document.getElementById('loginForm').onsubmit = handleLogin;
        init();
    </script>
</body>

</html>
